##########################################
# STATUS BAR
set  -g status-utf8 on
set  -g status-keys vi
set  -g status-interval 1
set  -g status-attr bright
set  -g status-fg black
set  -g status-bg white
set  -g status-left-length 20
set  -g status-right '#[fg=black]#[bg=green][tmux:#S]#[default]'
set  -g status-justify left
# set  -g status-justify centre
set  -g status-left ''
setw -g window-status-format '#[fg=white]#[bg=blue] #I #[default] #T'
setw -g window-status-current-format '#[fg=white]#[bg=blue] #F #[fg=black]#[bg=yellow] #W#[default]'
set  -g base-index 1
setw -g pane-base-index 1
setw  -g automatic-rename on
# setw  -g automatic-rename-format '#(echo $HOSTNAME)'

##########################################
# TERMINAL EMULATOR TITLES
# This section sets the title of the terminal window (PuTTY/MinTTy etc), not
# the tmux's own window titles that are shown on the status line
set -g set-titles on
# set -g set-titles-string "(tmux:#I) #W [#H] #P #T ; term #{client_termname} tty #{client_tty} cmd #{pane_current_command} pid #{pane_pid} st #{pane_start_command} path #{pane_start_path} ptty #{pane_tty}" # set -g set-titles-string "#(tmux ls | awk -F: '{print $1}' | xargs | sed 's/\ / | /g')"

##########################################
# DEFINE BETTER KEY BINDINGS
# C-j = prefix
unbind C-b
set -g prefix C-j

# C-j = last-window
#unbind l
bind C-j last-window

# Esc = copy-mode
#unbind [
#bind Escape copy-mode

# | = horizontal  split
unbind %
bind | split-window -h

# - = vertical split
unbind '"'
bind - split-window -v

# " = choose-window
#bind '"' choose-window

# h = display cheatsheet
bind h run "cat ~/dotfiles/tmux.cheatsheet | column -t"

# r = respawn after exit or disconnect (zombie)
#bind C-r respawn-window

# k = kill after exit or disconnect (zombie)
#bind C-k kill-window

bind R source ~/.tmux.conf \; display "Cofiguration reloaded!"

# Toggle mouse on with ^J m
bind m \
  set -g mode-mouse on \;\
  set -g mouse-resize-pane on \;\
  set -g mouse-select-pane on \;\
  set -g mouse-select-window on \;\
  display 'Mouse: ON'

# Toggle mouse off with ^J M
bind M \
  set -g mode-mouse off \;\
  set -g mouse-resize-pane off \;\
  set -g mouse-select-pane off \;\
  set -g mouse-select-window off \;\
  display 'Mouse: OFF'
#
##########################################
# BASIC CONFIG
# utf8 ability
setw -g utf8 on

# vi Style Editing
setw -g mode-keys vi

# Make mouse useful in copy mode
setw -g mode-mouse on

# Allow mouse to select which pane to use
set -g mouse-select-pane on

set  -g default-terminal "rxvt-unicode-256color"
#set  -g default-terminal "xterm-256color"
# Allow xterm titles in terminal window, terminal scrolling with scrollbar, and setting overrides of C-Up, C-Down, C-Left, C-Right
#set -g terminal-overrides "xterm*:XT:smcup@:rmcup@:kUP5=\eOA:kDN5=\eOB:kLFT5=\eOD:kRIT5=\eOC"
set -g terminal-overrides "rxvt*:XT:smcup@:rmcup@:kUP5=\eOA:kDN5=\eOB:kLFT5=\eOD:kRIT5=\eOC"

# Scroll History
set -g history-limit 30000

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on

# Lower escape timing from 500ms to 50ms for quicker response to scroll-buffer access.
set -s escape-time 50

# Set default command to "bash", so that when new window
# is opened, the shell there is *NOT* a login shell
set -g default-command "bash"

